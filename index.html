<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV2X</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial;
}

/* VIDEOS */
.video-background {
    position:fixed;
    inset:0;
    z-index:0;
}

.video-background video {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    min-width:100%;
    min-height:100%;
    object-fit:cover;
}

/* UI */
.coin-texte {
    position:fixed;
    top:20px;
    color:white;
    background:black;
    padding:8px 16px;
    z-index:2;
}

#haut-gauche { left:20px; }
#haut-droite { right:20px; }

.track-title {
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    z-index:2;
    font-size:28px;
}

/* NAV */
.nav-arrow {
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    font-size:30px;
    color:white;
    cursor:pointer;
    z-index:3;
}

#arrow-left { left:20px; }
#arrow-right { right:20px; }

/* START */
#start-message {
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.9);
    color:white;
    z-index:10;
    cursor:pointer;
    font-size:20px;
}

/* BUTTONS */
.play-pause-btn, .info-btn {
    position:fixed;
    bottom:40px;
    width:50px;
    height:50px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    z-index:5;
    cursor:pointer;
    border-radius:50%;
    background:rgba(0,0,0,0.4);
}

.play-pause-btn { right:20px; }
.info-btn { left:20px; }

/* PROGRESS */
.progress-container {
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:6px;
    background:rgba(255,255,255,0.1);
    z-index:6;
}

.progress-bar {
    height:100%;
    width:0%;
    background:#ff00d4;
}
</style>
</head>

<body>

<!-- VIDEOS -->
<div class="video-background">
    <video id="v0" muted loop playsinline src="video/video1.mp4"></video>
    <video id="v1" muted loop playsinline src="video/video2.mp4" style="display:none;"></video>
    <video id="v2" muted loop playsinline src="video/video3.mp4" style="display:none;"></video>
    <video id="v3" muted loop playsinline src="video/video4.mp4" style="display:none;"></video>
    <video id="v4" muted loop playsinline src="video/video5.mp4" style="display:none;"></video>
</div>

<!-- UI -->
<div id="haut-gauche" class="coin-texte">EV2X</div>
<div id="haut-droite" class="coin-texte">Les Pas Perdus</div>

<div class="track-title" id="title">Choose an Avatar</div>

<div id="arrow-left" class="nav-arrow">←</div>
<div id="arrow-right" class="nav-arrow">→</div>

<div id="start-message">CLIQUEZ POUR DÉMARRER</div>

<div class="play-pause-btn" id="play">⏸</div>
<div class="info-btn">i</div>

<!-- PROGRESS -->
<div class="progress-container">
    <div class="progress-bar" id="progress"></div>
</div>

<script>

const tracks = [
 {name:"Choose an avatar", audio:"music/1.mp3"},
 {name:"General distorsion", audio:"music/2.mp3"},
 {name:"Never forever", audio:"music/3.mp3"},
 {name:"Le grand Jeu", audio:"music/4.mp3"},
 {name:"Gertrude Stein", audio:"music/5.mp3"}
];

let i = 0;
let started = false;
let isPlaying = false;

const audio = new Audio();
audio.loop = true;
audio.volume = 0.8;

const progress = document.getElementById("progress");

/* PROGRESS BAR */
audio.ontimeupdate = () => {
 if(audio.duration){
  progress.style.width = (audio.currentTime / audio.duration) * 100 + "%";
 }
};

/* VIDEO CONTROL */
function showVideo(n, playVideo=true){
 for(let j=0;j<5;j++){
  const v=document.getElementById("v"+j);
  v.style.display = (j===n)?"block":"none";

  if(j===n && started && isPlaying && playVideo){
    v.play().catch(()=>{});
  } else {
    v.pause();
  }
 }
}

/* START */
document.getElementById("start-message").onclick = async () => {
 started = true;
 isPlaying = true;

 audio.src = tracks[0].audio;

 try {
  await audio.play();
 } catch(e){}

 showVideo(0);

 document.getElementById("start-message").style.display="none";
};

/* TRACK CHANGE */
function change(d){
 i += d;
 if(i<0) i=4;
 if(i>4) i=0;

 document.getElementById("title").innerText = tracks[i].name;

 audio.src = tracks[i].audio;
 audio.load();

 if(isPlaying){
  audio.play().catch(()=>{});
 }

 showVideo(i);
}

/* PLAY / PAUSE (SYNC AUDIO + VIDEO) */
document.getElementById("play").onclick = () => {

 const videos = document.querySelectorAll("video");

 if(audio.paused){
    audio.play();
    isPlaying = true;
    document.getElementById("play").innerText="⏸";

    videos.forEach(v=>{
        if(v.style.display==="block"){
            v.play().catch(()=>{});
        }
    });

 } else {
    audio.pause();
    isPlaying = false;
    document.getElementById("play").innerText="▶";

    videos.forEach(v=>{
        v.pause();
    });
 }
};

/* NAV */
document.getElementById("arrow-left").onclick=()=>change(-1);
document.getElementById("arrow-right").onclick=()=>change(1);

</script>

</body>
</html>
